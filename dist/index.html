<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080, initial-scale=1.0">
    <meta name="tv-navigation" content="true">
    <title>Toon Dash</title>

    <style>
        @font-face {
            font-family: 'Luckiest Guy';
            src: url('assets/fonts/LuckiestGuy-Regular.ttf') format('truetype');
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            background: #1a1a2e;
            font-family: 'Luckiest Guy', cursive;
        }

        #splash {
            position: absolute;
            top: 0;
            left: 0;
            width: 1920px;
            height: 1080px;
            background: url('assets/images/toon_dash_background.png') no-repeat center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s ease-out;
        }

        #splash.hidden {
            opacity: 0;
            pointer-events: none;
        }


        #loading-container {
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 830px;
            height: 100px;
            background: url('assets/images/loading_bar3.png') no-repeat center;
            background-size: contain;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #loading-fill {
            position: absolute;
            left: 25px;
            height: 50px;
            width: 0%;
            background: linear-gradient(180deg, #ff9d00 0%, #ff6b00 100%);
            border-radius: 13px;
            box-shadow: inset 0 2px 5px rgba(255, 255, 255, 0.4),
                0 0 15px rgba(255, 107, 0, 0.6);
            transition: width 0.2s ease-out;
            overflow: hidden;
        }

        #loading-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            100% {
                left: 100%;
            }
        }

        #loading-label {
            position: relative;
            z-index: 1001;
            font-size: 32px;
            color: white;
            text-shadow: 2px 2px 0px #000, -1px -1px 0px #000, 1px -1px 0px #000, -1px 1px 0px #000;
            letter-spacing: 2px;
        }

        #splash-status {
            position: absolute;
            top: calc(55% + 70px);
            font-size: 64px;
            color: #e4c900;
            text-transform: uppercase;
            text-shadow: 4px 4px 0px #000, -2px -2px 0px #000, 2px -2px 0px #000, -2px 2px 0px #000, 4px 0px 0px #000, -4px 0px 0px #000, 0px 4px 0px #000, 0px -4px 0px #000;
            letter-spacing: 6px;
        }

        #glcanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 1920px;
            height: 1080px;
            z-index: 1;
        }
    </style>
</head>

<body>
    <div id="splash">

        <div id="loading-container">
            <div id="loading-fill"></div>
            <div id="loading-label">0%</div>
        </div>

        <div id="splash-status">Initializing...</div>
    </div>

    <canvas id="glcanvas" tabindex="1" width="1920" height="1080"></canvas>

    <!-- TV Platform Abstraction Layer (PAL) - Load BEFORE WASM -->
    <script src="tv-pal.js"></script>

    <script src="mq_js_bundle.js"></script>

    <script>
        window.mq_save_highscore = function (score) {
            localStorage.setItem('toon_dash_high_score', score);
        };
        window.mq_load_highscore = function () {
            var score = localStorage.getItem('toon_dash_high_score');
            return score ? parseInt(score) : 0;
        };

        window.mq_set_progress = function (percent) {
            var fill = document.getElementById("loading-fill");
            var label = document.getElementById("loading-label");
            var status = document.getElementById("splash-status");

            if (fill) fill.style.width = (percent * 0.94) + "%";
            if (label) label.textContent = Math.round(percent) + "%";

            if (status) {
                if (percent >= 100) status.textContent = "READY!";
                else if (percent > 90) status.textContent = "Preparing character...";
                else if (percent > 40) status.textContent = "Loading models...";
                else if (percent > 10) status.textContent = "Connecting to engine...";
            }
        };

        window.mq_hide_splash = function () {
            var splash = document.getElementById("splash");
            if (splash) {
                splash.classList.add("hidden");
            }
            var canvas = document.getElementById("glcanvas");
            if (canvas) {
                canvas.focus();
            }
        };

        // --- Audio Visibility Handler (FireTV Home Button Fix) ---
        var audioContexts = [];
        (function () {
            var OldAudioContext = window.AudioContext || window.webkitAudioContext;
            if (OldAudioContext) {
                window.AudioContext = window.webkitAudioContext = function () {
                    var ctx = new OldAudioContext();
                    audioContexts.push(ctx);
                    return ctx;
                };
            }
        })();

        document.addEventListener("visibilitychange", function () {
            console.log("Visibility changed to: " + document.visibilityState);
            audioContexts.forEach(function (ctx) {
                if (document.visibilityState === 'hidden') {
                    ctx.suspend();
                } else if (document.visibilityState === 'visible') {
                    ctx.resume();
                }
            });
        });

        // Store references to WASM exported functions (will be set after WASM loads)
        window.__tvRustFunctions = null;

        // Note: The function MUST be named 'register_plugin'
        var ToonDashPlugin = {
            register_plugin: function (importObject) {
                // Register existing functions
                importObject.env.mq_save_highscore = window.mq_save_highscore;
                importObject.env.mq_load_highscore = window.mq_load_highscore;
                importObject.env.mq_set_progress = window.mq_set_progress;
                importObject.env.mq_hide_splash = window.mq_hide_splash;

                // Placeholder TV input functions - will be replaced after WASM loads
                importObject.env.mq_handle_up = function(pressed) {
                    console.log("[ToonDash] mq_handle_up placeholder (WASM not ready)");
                };
                importObject.env.mq_handle_down = function(pressed) {
                    console.log("[ToonDash] mq_handle_down placeholder (WASM not ready)");
                };
                importObject.env.mq_handle_left = function(pressed) {
                    console.log("[ToonDash] mq_handle_left placeholder (WASM not ready)");
                };
                importObject.env.mq_handle_right = function(pressed) {
                    console.log("[ToonDash] mq_handle_right placeholder (WASM not ready)");
                };
                importObject.env.mq_handle_action = function(pressed) {
                    console.log("[ToonDash] mq_handle_action placeholder (WASM not ready)");
                };
                importObject.env.mq_handle_back = function(pressed) {
                    console.log("[ToonDash] mq_handle_back placeholder (WASM not ready)");
                };

                console.log("[ToonDash] TV input placeholders registered");
            }
        };

        // Create window functions that will call the Rust functions
        // These will be usable by tv-pal.js
        window.mq_handle_up = function(pressed) {
            if (window.__tvRustFunctions && window.__tvRustFunctions.up) {
                window.__tvRustFunctions.up(pressed);
            } else {
                console.log("[ToonDash] mq_handle_up called before WASM ready");
            }
        };
        window.mq_handle_down = function(pressed) {
            if (window.__tvRustFunctions && window.__tvRustFunctions.down) {
                window.__tvRustFunctions.down(pressed);
            } else {
                console.log("[ToonDash] mq_handle_down called before WASM ready");
            }
        };
        window.mq_handle_left = function(pressed) {
            if (window.__tvRustFunctions && window.__tvRustFunctions.left) {
                window.__tvRustFunctions.left(pressed);
            } else {
                console.log("[ToonDash] mq_handle_left called before WASM ready");
            }
        };
        window.mq_handle_right = function(pressed) {
            if (window.__tvRustFunctions && window.__tvRustFunctions.right) {
                window.__tvRustFunctions.right(pressed);
            } else {
                console.log("[ToonDash] mq_handle_right called before WASM ready");
            }
        };
        window.mq_handle_action = function(pressed) {
            if (window.__tvRustFunctions && window.__tvRustFunctions.action) {
                window.__tvRustFunctions.action(pressed);
            } else {
                console.log("[ToonDash] mq_handle_action called before WASM ready");
            }
        };
        window.mq_handle_back = function(pressed) {
            if (window.__tvRustFunctions && window.__tvRustFunctions.back) {
                window.__tvRustFunctions.back(pressed);
            } else {
                console.log("[ToonDash] mq_handle_back called before WASM ready");
            }
        };

        // Hook into the load process to capture the exported Rust functions
        (function() {
            var originalLoad = window.load;
            window.load = function(wasmFile) {
                console.log("[ToonDash] Loading WASM with TV input hook...");

                var result = originalLoad.call(this, wasmFile);

                // Attach after WASM loads
                if (result && typeof result.then === 'function') {
                    result.then(function(wasmModule) {
                        console.log("[ToonDash] WASM loaded, extracting TV input functions...");

                        // The Rust functions with #[no_mangle] should be exported from WASM
                        // Macroquad makes the module available via the loading process
                        if (wasmModule && wasmModule.instance && wasmModule.instance.exports) {
                            var exports = wasmModule.instance.exports;
                            console.log("[ToonDash] WASM exports available:", Object.keys(exports));

                            // Store the actual Rust function references
                            window.__tvRustFunctions = {
                                up: exports.mq_handle_up,
                                down: exports.mq_handle_down,
                                left: exports.mq_handle_left,
                                right: exports.mq_handle_right,
                                action: exports.mq_handle_action,
                                back: exports.mq_handle_back
                            };

                            // Verify we got the functions
                            var missingFunctions = [];
                            if (!window.__tvRustFunctions.up) missingFunctions.push('up');
                            if (!window.__tvRustFunctions.down) missingFunctions.push('down');
                            if (!window.__tvRustFunctions.left) missingFunctions.push('left');
                            if (!window.__tvRustFunctions.right) missingFunctions.push('right');
                            if (!window.__tvRustFunctions.action) missingFunctions.push('action');
                            if (!window.__tvRustFunctions.back) missingFunctions.push('back');

                            if (missingFunctions.length > 0) {
                                console.warn("[ToonDash] Missing Rust functions:", missingFunctions);
                            } else {
                                console.log("[ToonDash] All TV input functions connected!");
                            }
                        } else {
                            console.warn("[ToonDash] Could not access WASM exports");
                        }
                    }).catch(function(err) {
                        console.error("[ToonDash] Failed to load WASM:", err);
                    });
                }

                return result;
            };
        })();

        // Wait for the entire page (and mq_js_bundle.js) to be fully loaded and parsed
        window.addEventListener('load', function () {
            console.log("Page loaded, initializing engine...");

            var status = document.getElementById("splash-status");

            // Safety check: Did the bundle actually load?
            if (typeof miniquad_add_plugin === "undefined" || typeof load === "undefined") {
                console.error("FATAL: mq_js_bundle.js failed to execute.");
                if (status) status.textContent = "Error: Engine script failed.";
                return;
            }

            // Register plugin and load WASM
            miniquad_add_plugin(ToonDashPlugin);
            load("toon-dash.wasm");
        });
    </script>
</body>

</html>
